version: '3.8'

services:
  pipeline-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haystack-pipeline-builder
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - ./gen:/app/gen  # Erlaubt das persistente Speichern generierter Pipelines auf dem Host-System
    restart: unless-stopped
